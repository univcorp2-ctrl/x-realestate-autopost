name: Cloudflare Worker Tests

on:
  push:
    paths:
      - "cloudflare-worker/**"
      - ".github/workflows/cloudflare-worker-tests.yml"
  pull_request:
    paths:
      - "cloudflare-worker/**"
      - ".github/workflows/cloudflare-worker-tests.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test
